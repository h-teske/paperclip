name: Build and Push Container

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract upstream version
        id: version
        run: |
          VERSION=$(grep 'ARG PAPERCLIP_VERSION=' Dockerfile | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Clone upstream paperclip at version
        run: |
          git clone --depth 1 --branch ${{ steps.version.outputs.version }} \
            https://github.com/paperclipai/paperclip.git upstream
          # Workaround: upstream lockfile may be out of sync with package.json.
          # Relax frozen-lockfile so the build can proceed.
          sed -i 's/pnpm install --frozen-lockfile/pnpm install --no-frozen-lockfile/g' \
            upstream/Dockerfile
          # Workaround: upstream v2026.318.0 Dockerfile is missing the COPY for
          # packages/plugins/sdk/package.json, but server depends on @paperclipai/plugin-sdk@workspace:*.
          # Also add a build step for plugin-sdk before the server build.
          if [ -f upstream/packages/plugins/sdk/package.json ]; then
            sed -i 's|COPY packages/adapters/pi-local/package.json packages/adapters/pi-local/|COPY packages/adapters/pi-local/package.json packages/adapters/pi-local/\nCOPY packages/plugins/sdk/package.json packages/plugins/sdk/|' \
              upstream/Dockerfile
            sed -i 's|RUN pnpm --filter @paperclipai/ui build|RUN pnpm --filter @paperclipai/plugin-sdk build\nRUN pnpm --filter @paperclipai/ui build|' \
              upstream/Dockerfile
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/paperclip
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./upstream
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
