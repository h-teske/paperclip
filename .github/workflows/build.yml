name: Build and Push Container

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract upstream version
        id: version
        run: |
          VERSION=$(grep 'ARG PAPERCLIP_VERSION=' Dockerfile | cut -d= -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Clone upstream paperclip at version
        run: |
          git clone --depth 1 --branch ${{ steps.version.outputs.version }} \
            https://github.com/paperclipai/paperclip.git upstream
          # Workaround: upstream v0.3.0 lockfile is out of sync with package.json
          # (missing cross-env). Relax frozen-lockfile so the build can proceed.
          sed -i 's/pnpm install --frozen-lockfile/pnpm install --no-frozen-lockfile/g' \
            upstream/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/paperclip
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
